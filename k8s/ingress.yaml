apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: integra-portal-ingress
  namespace: integramanufactureapp
  annotations:
    # Use standard Nginx Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Optional integration with cert-manager for automated SSL certificates
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - integra-portal.example.com
      secretName: integra-portal-tls
  rules:
    - host: integra-portal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: integra-portal-service
                port:
                  name: http
