apiVersion: v1
kind: Secret
metadata:
  name: integra-secrets
  namespace: integramanufactureapp
  labels:
    app: integra-portal
    tier: frontend-backend
type: Opaque
stringData:
  # Replace with your actual Gemini API key
  # Using stringData allows putting raw values which Kubernetes automatically base64 encodes
  GEMINI_API_KEY: "YOUR_RAW_GEMINI_API_KEY"
